[server]
# Required for cloud deployments (no local browser to open)
headless = true
# XSRF protection against cross-site request forgery
enableXsrfProtection = true
# Do not allow CORS requests from unknown origins
enableCORS = false

[browser]
# Do not send usage statistics to Streamlit
gatherUsageStats = false

[theme]
primaryColor = "#1F497D"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
